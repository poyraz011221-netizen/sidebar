<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonNotes — GX Sidebar</title>
    <meta name="description" content="Opera GX Sidebar için premium not uygulaması.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0c0c12;
            --bg-secondary: #111118;
            --bg-tertiary: #191924;
            --bg-hover: #1e1e2e;
            --bg-active: #24243a;
            --bg-input: #0e0e16;

            --border: #2a2a3c;
            --border-subtle: #1c1c2c;
            --border-focus: #7c3aed;

            --text-primary: #e4e4ec;
            --text-secondary: #8888a8;
            --text-muted: #555570;

            --accent: #7c3aed;
            --accent-hover: #6d28d9;
            --accent-subtle: rgba(124, 58, 237, 0.12);
            --accent-glow: 0 0 16px rgba(124, 58, 237, 0.25);

            --danger: #ef4444;
            --success: #10b981;

            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;

            --transition: 150ms ease;

            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* ===== LAYOUT ===== */
        #app { display: flex; height: 100vh; }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 16px 14px 12px;
            border-bottom: 1px solid var(--border);
        }

        .app-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .app-logo {
            width: 30px;
            height: 30px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: var(--accent-glow);
        }

        .app-title {
            font-size: 15px;
            font-weight: 700;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-subtitle {
            font-size: 9px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Search */
        .search-box { position: relative; }

        .search-box input {
            width: 100%;
            padding: 8px 10px 8px 32px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 12px;
            font-family: var(--font);
            outline: none;
            transition: var(--transition);
        }

        .search-box input::placeholder { color: var(--text-muted); }
        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 13px;
            pointer-events: none;
        }

        /* Neon line */
        .neon-line {
            height: 1px;
            background: linear-gradient(90deg, #7c3aed, #06b6d4, #7c3aed);
            opacity: 0.5;
        }

        /* Sidebar actions */
        .sidebar-actions {
            display: flex;
            gap: 6px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .action-btn {
            flex: 1;
            padding: 7px 0;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-size: 11px;
            font-family: var(--font);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .action-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Folder list */
        .folder-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        .section-label {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
            padding: 10px 14px 4px;
        }

        .folder-header {
            display: flex;
            align-items: center;
            padding: 7px 14px;
            cursor: pointer;
            transition: var(--transition);
            gap: 7px;
        }

        .folder-header:hover { background: var(--bg-hover); }
        .folder-header.active { background: var(--bg-active); }

        .folder-chevron {
            font-size: 9px;
            color: var(--text-muted);
            transition: transform var(--transition);
            width: 12px;
            text-align: center;
        }

        .folder-chevron.open { transform: rotate(90deg); }

        .folder-icon { font-size: 13px; }

        .folder-name {
            font-size: 12.5px;
            font-weight: 500;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .folder-count {
            font-size: 10px;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            padding: 1px 6px;
            border-radius: 10px;
            font-weight: 500;
        }

        .folder-actions {
            display: flex;
            align-items: center;
            gap: 2px;
            opacity: 0;
            transition: var(--transition);
        }

        .folder-header:hover .folder-actions { opacity: 1; }

        .folder-move-btn {
            font-size: 9px;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            padding: 2px 3px;
            border-radius: 3px;
            line-height: 1;
        }

        .folder-move-btn:hover { color: var(--accent); background: var(--accent-subtle); }

        .folder-star {
            font-size: 11px;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
            opacity: 0;
        }

        .folder-header:hover .folder-star, .folder-star.starred { opacity: 1; }
        .folder-star.starred { color: #f59e0b; text-shadow: 0 0 6px rgba(245,158,11,0.4); }

        .folder-menu-btn {
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            opacity: 0;
            transition: var(--transition);
            padding: 0 2px;
        }

        .folder-header:hover .folder-menu-btn { opacity: 1; }
        .folder-menu-btn:hover { color: var(--text-primary); }

        /* Notes */
        .note-list {
            overflow: hidden;
            transition: max-height 300ms ease;
        }
        .note-list.collapsed { max-height: 0 !important; }

        .note-item {
            display: flex;
            align-items: center;
            padding: 6px 14px 6px 38px;
            cursor: pointer;
            transition: var(--transition);
            gap: 8px;
            position: relative;
        }

        .note-item:hover { background: var(--bg-hover); }

        .note-item.active {
            background: var(--bg-active);
        }

        .note-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 4px;
            width: 2px;
            background: var(--accent);
            border-radius: 0 2px 2px 0;
        }

        .note-icon {
            font-size: 11px;
            color: var(--text-muted);
        }

        .note-info { flex: 1; min-width: 0; }

        .note-title {
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-date {
            font-size: 10px;
            color: var(--text-muted);
        }

        .note-actions {
            display: flex;
            align-items: center;
            gap: 2px;
            opacity: 0;
            transition: var(--transition);
        }

        .note-item:hover .note-actions { opacity: 1; }

        .move-btn, .note-delete-btn {
            font-size: 10px;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            padding: 2px 3px;
            border-radius: 3px;
            line-height: 1;
        }

        .move-btn:hover { color: var(--accent); background: var(--accent-subtle); }
        .note-delete-btn:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

        .add-note-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 14px 5px 38px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-muted);
            font-size: 11px;
        }

        .add-note-btn:hover {
            color: var(--accent);
            background: var(--bg-hover);
        }

        /* Footer */
        .sidebar-footer {
            padding: 10px 14px;
            border-top: 1px solid var(--border);
        }

        .sidebar-stats { display: flex; justify-content: space-around; }

        .stat-item { text-align: center; }
        .stat-value { font-size: 15px; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        /* Save indicator */
        .save-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            color: var(--text-muted);
            padding: 4px 14px;
            border-top: 1px solid var(--border-subtle);
            transition: var(--transition);
        }

        .save-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            transition: var(--transition);
        }

        .save-dot.saving { background: #f59e0b; animation: pulse 0.6s ease infinite; }
        .save-dot.unsaved { background: var(--danger); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ===== EDITOR ===== */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            min-width: 0;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 40px;
        }

        .empty-icon {
            font-size: 48px;
            opacity: 0.25;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .empty-title { font-size: 16px; font-weight: 600; color: var(--text-secondary); }
        .empty-desc { font-size: 12px; color: var(--text-muted); text-align: center; max-width: 220px; line-height: 1.6; }

        .shortcut-hint {
            font-size: 10px;
            color: var(--text-muted);
            background: var(--bg-input);
            padding: 1px 5px;
            border-radius: 3px;
            font-family: var(--font-mono);
            border: 1px solid var(--border);
        }

        /* Editor header */
        .editor-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-secondary);
        }

        .editor-back-btn {
            display: none;
            padding: 6px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            border-radius: var(--radius-sm);
        }

        .editor-back-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

        .editor-title-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 600;
            font-family: var(--font);
            outline: none;
            padding: 4px 0;
        }

        .editor-title-input::placeholder { color: var(--text-muted); }

        .editor-meta { display: flex; align-items: center; gap: 10px; }

        .editor-folder-badge {
            font-size: 10px;
            color: #a78bfa;
            background: var(--accent-subtle);
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
            white-space: nowrap;
        }

        .editor-date { font-size: 10px; color: var(--text-muted); white-space: nowrap; }

        /* Toolbar */
        .editor-toolbar {
            padding: 6px 20px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 2px;
            flex-wrap: wrap;
            background: var(--bg-secondary);
        }

        .toolbar-btn {
            padding: 4px 7px;
            background: none;
            border: 1px solid transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            font-family: var(--font);
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 26px;
            height: 26px;
        }

        .toolbar-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border);
        }

        .toolbar-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .toolbar-sep {
            width: 1px;
            height: 18px;
            background: var(--border);
            margin: 0 4px;
        }

        /* Editor content */
        .editor-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .rich-editor {
            width: 100%;
            min-height: 300px;
            outline: none;
            color: var(--text-primary);
            font-size: 13.5px;
            font-family: var(--font);
            line-height: 1.8;
            word-wrap: break-word;
        }

        .rich-editor:empty::before {
            content: 'Notunuzu buraya yazın...';
            color: var(--text-muted);
        }

        .rich-editor h1, .rich-editor h2, .rich-editor h3 { margin: 0.4em 0 0.2em; line-height: 1.3; }
        .rich-editor ul, .rich-editor ol { padding-left: 22px; margin: 0.3em 0; }
        .rich-editor blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 12px;
            margin: 0.5em 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        .rich-editor code {
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 12.5px;
        }
        .rich-editor a { color: #06b6d4; text-decoration: underline; }

        /* Editor footer */
        .editor-footer {
            padding: 8px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-secondary);
        }

        .char-count { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }

        .editor-actions { display: flex; gap: 8px; }

        .btn {
            padding: 6px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 11px;
            font-family: var(--font);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .btn-primary:hover { background: var(--accent-hover); box-shadow: var(--accent-glow); }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border-color: rgba(239,68,68,0.3);
        }
        .btn-danger:hover { background: var(--danger); color: white; }

        .btn-ghost { background: transparent; color: var(--text-secondary); }
        .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }

        /* ===== CONTEXT MENU ===== */
        .context-menu {
            position: fixed;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 4px;
            min-width: 150px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            animation: menuIn 120ms ease-out;
        }

        @keyframes menuIn {
            from { opacity: 0; transform: scale(0.96) translateY(-4px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .ctx-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .ctx-item:hover { background: var(--accent); color: white; }
        .ctx-item.danger:hover { background: var(--danger); }
        .ctx-divider { height: 1px; background: var(--border); margin: 3px 0; }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 150ms ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 22px;
            min-width: 280px;
            max-width: 90%;
            box-shadow: 0 16px 64px rgba(0,0,0,0.5);
            animation: slideUp 200ms ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(16px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }

        .modal-input {
            width: 100%;
            padding: 9px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 13px;
            font-family: var(--font);
            outline: none;
            margin-bottom: 6px;
            transition: var(--transition);
        }

        .modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-subtle); }

        .modal-icon-picker { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0; }

        .icon-option {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            cursor: pointer;
            font-size: 15px;
            transition: var(--transition);
        }

        .icon-option:hover { border-color: var(--accent); }
        .icon-option.active { border-color: var(--accent); background: var(--accent-subtle); box-shadow: var(--accent-glow); }

        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .toast {
            padding: 8px 16px;
            border-radius: var(--radius-md);
            font-size: 12px;
            font-weight: 500;
            color: white;
            animation: toastIn 250ms ease-out, toastOut 250ms ease-in 2500ms forwards;
            box-shadow: 0 6px 24px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.info { background: var(--accent); }

        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(8px); } }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 500px) {
            .sidebar {
                position: absolute;
                left: 0; top: 0; bottom: 0;
                width: 100%;
                min-width: unset;
                z-index: 100;
                transition: transform 250ms ease;
            }
            .sidebar.hidden { transform: translateX(-100%); }
            .editor-back-btn { display: flex; }
        }
    </style>
</head>
<body>

<div id="app">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="app-brand">
                <div class="app-logo">📝</div>
                <div>
                    <div class="app-title">NeonNotes</div>
                    <div class="app-subtitle">GX Sidebar</div>
                </div>
            </div>
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Notlarda ara..." autocomplete="off">
            </div>
        </div>
        <div class="neon-line"></div>

        <div class="sidebar-actions">
            <button class="action-btn" id="newFolderBtn">📁 Klasör</button>
            <button class="action-btn" id="newQuickNoteBtn">⚡ Hızlı Not</button>
        </div>

        <div class="folder-list" id="folderList"></div>

        <div class="save-indicator" id="saveIndicator">
            <span class="save-dot" id="saveDot"></span>
            <span id="saveText">Kaydedildi</span>
        </div>

        <div class="sidebar-footer">
            <div class="sidebar-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalFolders">0</div>
                    <div class="stat-label">Klasör</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalNotes">0</div>
                    <div class="stat-label">Not</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalChars">0</div>
                    <div class="stat-label">Karakter</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="editor-panel" id="editorPanel">
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">✨</div>
            <div class="empty-title">Not Seçin veya Oluşturun</div>
            <div class="empty-desc">Bir not seçerek düzenlemeye başlayın veya yeni bir not oluşturun.</div>
            <div style="display:flex; gap:8px; margin-top:6px;">
                <span class="shortcut-hint">Ctrl+N</span>
                <span style="font-size:11px; color:var(--text-muted)">Hızlı not</span>
            </div>
        </div>

        <div id="editorView" style="display:none; flex-direction:column; flex:1;">
            <div class="editor-header">
                <button class="editor-back-btn" id="editorBackBtn">◀</button>
                <input type="text" class="editor-title-input" id="noteTitleInput" placeholder="Not başlığı..." maxlength="100">
                <div class="editor-meta">
                    <span class="editor-folder-badge" id="editorFolderBadge"></span>
                    <span class="editor-date" id="editorDate"></span>
                </div>
            </div>

            <div class="editor-toolbar" id="editorToolbar">
                <button class="toolbar-btn" data-cmd="bold" title="Kalın (Ctrl+B)"><b>B</b></button>
                <button class="toolbar-btn" data-cmd="italic" title="İtalik (Ctrl+I)"><i>I</i></button>
                <button class="toolbar-btn" data-cmd="underline" title="Altı Çizili (Ctrl+U)"><u>U</u></button>
                <button class="toolbar-btn" data-cmd="strikeThrough" title="Üstü Çizili"><s>S</s></button>
                <div class="toolbar-sep"></div>
                <button class="toolbar-btn" data-cmd="insertUnorderedList" title="Madde İşareti">•</button>
                <button class="toolbar-btn" data-cmd="insertOrderedList" title="Numaralı Liste">1.</button>
                <div class="toolbar-sep"></div>
                <button class="toolbar-btn" data-cmd-block="h2" title="Başlık">H</button>
                <button class="toolbar-btn" data-cmd-block="blockquote" title="Alıntı">❝</button>
                <button class="toolbar-btn" data-cmd="insertHorizontalRule" title="Çizgi">―</button>
                <div class="toolbar-sep"></div>
                <button class="toolbar-btn" id="insertLinkBtn" title="Link Ekle">🔗</button>
                <button class="toolbar-btn" id="insertCodeBtn" title="Kod">{ }</button>
            </div>

            <div class="editor-content">
                <div class="rich-editor" id="richEditor" contenteditable="true"></div>
            </div>

            <div class="editor-footer">
                <span class="char-count" id="charCount">0 karakter</span>
                <div class="editor-actions">
                    <button class="btn btn-danger" id="deleteNoteBtn">🗑 Sil</button>
                    <button class="btn btn-primary" id="saveNoteBtn">💾 Kaydet</button>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ===== DATA =====
const STORAGE_KEY = 'neonnotes_data';
let appData = { folders: [], activeNoteId: null, activeFolderId: null, expandedFolders: {} };
let currentEditingNote = null;
let saveDebounceTimer = null;
let isDirty = false;

function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 8); }

function loadData() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) appData = { ...appData, ...JSON.parse(raw) };
        if (!appData.folders.length) createDefaults();
    } catch { createDefaults(); }
}

function saveData() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
        isDirty = false;
        updateSaveIndicator('saved');
    } catch (e) {
        updateSaveIndicator('error');
        console.error('Save failed:', e);
    }
    updateStats();
}

// Instant save with micro-debounce (300ms) to avoid hammering storage on fast typing
function instantSave() {
    isDirty = true;
    updateSaveIndicator('saving');
    clearTimeout(saveDebounceTimer);
    saveDebounceTimer = setTimeout(() => {
        if (currentEditingNote) {
            const result = getNote(currentEditingNote.note.id);
            if (result) {
                result.note.title = document.getElementById('noteTitleInput').value.trim() || 'Başlıksız Not';
                result.note.content = document.getElementById('richEditor').innerHTML;
                result.note.updatedAt = Date.now();
                currentEditingNote = result;
            }
        }
        saveData();
        renderFolders();
    }, 300);
}

// Save indicator
function updateSaveIndicator(state) {
    const dot = document.getElementById('saveDot');
    const text = document.getElementById('saveText');
    dot.className = 'save-dot';
    if (state === 'saving') {
        dot.classList.add('saving');
        text.textContent = 'Kaydediliyor...';
    } else if (state === 'saved') {
        text.textContent = 'Kaydedildi';
    } else if (state === 'error') {
        dot.classList.add('unsaved');
        text.textContent = 'Kayıt hatası!';
    } else if (state === 'unsaved') {
        dot.classList.add('unsaved');
        text.textContent = 'Kaydedilmedi';
    }
}

// Save before page unload
window.addEventListener('beforeunload', () => {
    if (currentEditingNote) {
        const result = getNote(currentEditingNote.note.id);
        if (result) {
            result.note.title = document.getElementById('noteTitleInput').value.trim() || 'Başlıksız Not';
            result.note.content = document.getElementById('richEditor').innerHTML;
            result.note.updatedAt = Date.now();
        }
    }
    saveData();
});

// Also save on visibility change (tab switch, minimize)
document.addEventListener('visibilitychange', () => {
    if (document.hidden && currentEditingNote) {
        const result = getNote(currentEditingNote.note.id);
        if (result) {
            result.note.title = document.getElementById('noteTitleInput').value.trim() || 'Başlıksız Not';
            result.note.content = document.getElementById('richEditor').innerHTML;
            result.note.updatedAt = Date.now();
        }
        saveData();
    }
});

function createDefaults() {
    const f1 = uid(), f2 = uid();
    appData.folders = [
        {
            id: f1, name: 'Kişisel Notlar', icon: '📋', starred: true, createdAt: Date.now(),
            notes: [
                {
                    id: uid(), title: 'NeonNotes\'a Hoş Geldiniz!',
                    content: '<h2>🎉 Hoş Geldiniz!</h2><p>Bu uygulama ile notlarınızı kolayca yönetebilirsiniz.</p><p><br></p><ul><li>📁 Klasörlerle organize edin</li><li>⭐ Favori klasörleri sabitleyin</li><li>🔍 Notlarda hızlıca arama yapın</li><li>💾 Her değişiklik anında kaydedilir</li></ul><p><br></p><blockquote>Yazdığınız her şey anında kaydedilir, hiçbir şey kaybolmaz.</blockquote>',
                    createdAt: Date.now(), updatedAt: Date.now()
                },
                {
                    id: uid(), title: 'Yapılacaklar',
                    content: '<p>✅ NeonNotes kurulumu tamamlandı</p><p>⬜ Yeni projeler için notlar oluştur</p><p>⬜ Önemli bağlantıları kaydet</p>',
                    createdAt: Date.now() - 100000, updatedAt: Date.now() - 100000
                }
            ]
        },
        {
            id: f2, name: 'Projeler', icon: '🚀', starred: false, createdAt: Date.now() - 200000,
            notes: [
                {
                    id: uid(), title: 'Proje Fikirleri',
                    content: '<p>💡 <b>Proje Fikirleri</b></p><ul><li>Web uygulaması geliştirme</li><li>Mobil uygulama tasarımı</li><li>API entegrasyonları</li></ul>',
                    createdAt: Date.now() - 300000, updatedAt: Date.now() - 300000
                }
            ]
        }
    ];
    appData.expandedFolders[f1] = true;
    appData.expandedFolders[f2] = true;
    saveData();
}

// ===== HELPERS =====
function getFolder(id) { return appData.folders.find(f => f.id === id); }
function getNote(id) {
    for (const f of appData.folders) {
        const n = f.notes.find(n => n.id === id);
        if (n) return { note: n, folder: f };
    }
    return null;
}
function getAllNotes() { return appData.folders.flatMap(f => f.notes); }

function formatDate(ts) {
    const d = new Date(ts), diff = Date.now() - ts;
    if (diff < 60000) return 'Az önce';
    if (diff < 3600000) return Math.floor(diff / 60000) + ' dk önce';
    if (diff < 86400000) return Math.floor(diff / 3600000) + ' saat önce';
    return `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function escapeHTML(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ===== TOAST =====
function showToast(msg, type = 'success') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

// ===== CONTEXT MENU =====
let ctxMenu = null;

function showCtx(e, items) {
    hideCtx();
    const m = document.createElement('div');
    m.className = 'context-menu';
    items.forEach(item => {
        if (item.divider) { const d = document.createElement('div'); d.className = 'ctx-divider'; m.appendChild(d); return; }
        const el = document.createElement('div');
        el.className = 'ctx-item' + (item.danger ? ' danger' : '');
        el.innerHTML = `<span>${item.icon||''}</span> ${item.label}`;
        el.onclick = () => { hideCtx(); item.action(); };
        m.appendChild(el);
    });
    document.body.appendChild(m);
    const r = m.getBoundingClientRect();
    m.style.left = Math.min(e.clientX, window.innerWidth - r.width - 8) + 'px';
    m.style.top = Math.min(e.clientY, window.innerHeight - r.height - 8) + 'px';
    ctxMenu = m;
}

function hideCtx() { if (ctxMenu) { ctxMenu.remove(); ctxMenu = null; } }
document.addEventListener('click', hideCtx);

// ===== MODAL =====
function showModal({ title, placeholder, defaultValue = '', iconPicker = false, onConfirm }) {
    const ov = document.createElement('div');
    ov.className = 'modal-overlay';
    const icons = ['📋','📁','🚀','💡','🎮','📚','🎵','🎨','⚙️','🌟','📌','🏠','💼','🔬','📝','🗂️'];
    let selIcon = '📁';
    ov.innerHTML = `
        <div class="modal">
            <div class="modal-title">${title}</div>
            <input class="modal-input" placeholder="${placeholder}" value="${defaultValue}" id="modalInput" autofocus>
            ${iconPicker ? `<div style="font-size:11px;color:var(--text-muted);margin-top:8px;">İkon:</div><div class="modal-icon-picker">${icons.map((ic,i) => `<div class="icon-option${i===0?' active':''}" data-icon="${ic}">${ic}</div>`).join('')}</div>` : ''}
            <div class="modal-actions">
                <button class="btn btn-ghost" id="modalCancel">İptal</button>
                <button class="btn btn-primary" id="modalConfirm">Tamam</button>
            </div>
        </div>`;
    document.body.appendChild(ov);
    const inp = ov.querySelector('#modalInput');
    inp.focus(); inp.select();
    if (iconPicker) ov.querySelectorAll('.icon-option').forEach(o => { o.onclick = () => { ov.querySelectorAll('.icon-option').forEach(x => x.classList.remove('active')); o.classList.add('active'); selIcon = o.dataset.icon; }; });
    const close = () => ov.remove();
    const confirm = () => { const v = inp.value.trim(); if (v) { onConfirm(v, selIcon); close(); } };
    ov.querySelector('#modalCancel').onclick = close;
    ov.onclick = e => { if (e.target === ov) close(); };
    ov.querySelector('#modalConfirm').onclick = confirm;
    inp.onkeydown = e => { if (e.key === 'Enter') confirm(); if (e.key === 'Escape') close(); };
}

// ===== RENDER =====
function renderFolders() {
    const c = document.getElementById('folderList');
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    // Render in actual array order (user-controlled), no auto-sort
    let h = '';
    appData.folders.forEach(f => h += folderHTML(f, q));
    c.innerHTML = h;
    attachEvents();
}

function folderHTML(folder, q) {
    const exp = appData.expandedFolders[folder.id];
    const act = appData.activeFolderId === folder.id;
    let notes = folder.notes;
    if (q) { notes = notes.filter(n => n.title.toLowerCase().includes(q) || n.content.replace(/<[^>]*>/g,'').toLowerCase().includes(q)); if (!notes.length && !folder.name.toLowerCase().includes(q)) return ''; }
    const fi = appData.folders.indexOf(folder);
    let h = `<div data-fid="${folder.id}">
        <div class="folder-header ${act?'active':''}" data-fid="${folder.id}">
            <span class="folder-chevron ${exp?'open':''}">▶</span>
            <span class="folder-icon">${folder.icon||'📁'}</span>
            <span class="folder-name">${escapeHTML(folder.name)}</span>
            <span class="folder-count">${folder.notes.length}</span>
            <span class="folder-actions">
                <span class="folder-move-btn" data-fid="${folder.id}" data-dir="up" title="Yukarı">▲</span>
                <span class="folder-move-btn" data-fid="${folder.id}" data-dir="down" title="Aşağı">▼</span>
            </span>
            <span class="folder-star ${folder.starred?'starred':''}" data-fid="${folder.id}">★</span>
            <span class="folder-menu-btn" data-fid="${folder.id}">⋮</span>
        </div>
        <div class="note-list ${exp?'':'collapsed'}" style="max-height:${exp ? notes.length*48+36+'px' : '0'}">`;
    notes.forEach((n, ni) => {
        const na = appData.activeNoteId === n.id;
        h += `<div class="note-item ${na?'active':''}" data-nid="${n.id}" data-fid="${folder.id}">
            <span class="note-icon">📄</span>
            <div class="note-info"><div class="note-title">${escapeHTML(n.title||'Başlıksız Not')}</div><div class="note-date">${formatDate(n.updatedAt)}</div></div>
            <span class="note-actions">
                <span class="move-btn" data-nid="${n.id}" data-fid="${folder.id}" data-dir="up" title="Yukarı">▲</span>
                <span class="move-btn" data-nid="${n.id}" data-fid="${folder.id}" data-dir="down" title="Aşağı">▼</span>
                <span class="note-delete-btn" data-nid="${n.id}" data-fid="${folder.id}" title="Sil">✕</span>
            </span>
        </div>`;
    });
    h += `<div class="add-note-btn" data-fid="${folder.id}"><span>+</span> Yeni Not Ekle</div></div></div>`;
    return h;
}

function attachEvents() {
    document.querySelectorAll('.folder-header').forEach(el => {
        el.onclick = e => {
            if (e.target.classList.contains('folder-star') || e.target.classList.contains('folder-menu-btn') || e.target.classList.contains('folder-move-btn')) return;
            const id = el.dataset.fid;
            appData.expandedFolders[id] = !appData.expandedFolders[id];
            appData.activeFolderId = id;
            saveData(); renderFolders();
        };
        el.oncontextmenu = e => { e.preventDefault(); folderCtx(e, el.dataset.fid); };
    });

    document.querySelectorAll('.folder-star').forEach(el => {
        el.onclick = e => { e.stopPropagation(); const f = getFolder(el.dataset.fid); if (f) { f.starred = !f.starred; saveData(); renderFolders(); } };
    });

    document.querySelectorAll('.folder-menu-btn').forEach(el => {
        el.onclick = e => { e.stopPropagation(); folderCtx(e, el.dataset.fid); };
    });

    // Folder move buttons
    document.querySelectorAll('.folder-move-btn').forEach(el => {
        el.onclick = e => { e.stopPropagation(); moveFolderDir(el.dataset.fid, el.dataset.dir); };
    });

    document.querySelectorAll('.note-item').forEach(el => {
        el.onclick = e => { if (e.target.closest('.note-actions')) return; openNote(el.dataset.nid); };
        el.oncontextmenu = e => { e.preventDefault(); noteCtx(e, el.dataset.nid, el.dataset.fid); };
    });

    // Note move buttons
    document.querySelectorAll('.move-btn').forEach(el => {
        el.onclick = e => { e.stopPropagation(); moveNoteDir(el.dataset.nid, el.dataset.fid, el.dataset.dir); };
    });

    document.querySelectorAll('.note-delete-btn').forEach(el => {
        el.onclick = e => { e.stopPropagation(); deleteNote(el.dataset.nid, el.dataset.fid); };
    });

    document.querySelectorAll('.add-note-btn').forEach(el => {
        el.onclick = () => createNote(el.dataset.fid);
    });
}

function folderCtx(e, fid) {
    const f = getFolder(fid); if (!f) return;
    const idx = appData.folders.indexOf(f);
    showCtx(e, [
        { icon: '📝', label: 'Yeni Not', action: () => createNote(fid) },
        { divider: true },
        { icon: '▲', label: 'Yukarı Taşı', action: () => moveFolderDir(fid, 'up') },
        { icon: '▼', label: 'Aşağı Taşı', action: () => moveFolderDir(fid, 'down') },
        { divider: true },
        { icon: '✏️', label: 'Adını Değiştir', action: () => renameFolder(fid) },
        { icon: f.starred ? '☆' : '⭐', label: f.starred ? 'Sabitlemeyi Kaldır' : 'Sabitle', action: () => { f.starred = !f.starred; saveData(); renderFolders(); } },
        { divider: true },
        { icon: '🗑', label: 'Sil', danger: true, action: () => deleteFolder(fid) }
    ]);
}

function noteCtx(e, nid, fid) {
    const others = appData.folders.filter(f => f.id !== fid);
    const items = [
        { icon: '📝', label: 'Düzenle', action: () => openNote(nid) },
        { icon: '📋', label: 'Kopyala', action: () => duplicateNote(nid, fid) },
        { divider: true },
        { icon: '▲', label: 'Yukarı Taşı', action: () => moveNoteDir(nid, fid, 'up') },
        { icon: '▼', label: 'Aşağı Taşı', action: () => moveNoteDir(nid, fid, 'down') },
    ];
    if (others.length) {
        items.push({ divider: true });
        others.forEach(f => items.push({ icon: f.icon||'📁', label: `${f.name}'e Taşı`, action: () => moveNote(nid, fid, f.id) }));
    }
    items.push({ divider: true });
    items.push({ icon: '🗑', label: 'Sil', danger: true, action: () => deleteNote(nid, fid) });
    showCtx(e, items);
}

// ===== MOVE UP/DOWN =====
function moveNoteDir(nid, fid, dir) {
    const f = getFolder(fid); if (!f) return;
    const idx = f.notes.findIndex(n => n.id === nid);
    if (idx === -1) return;
    if (dir === 'up' && idx > 0) {
        [f.notes[idx - 1], f.notes[idx]] = [f.notes[idx], f.notes[idx - 1]];
    } else if (dir === 'down' && idx < f.notes.length - 1) {
        [f.notes[idx], f.notes[idx + 1]] = [f.notes[idx + 1], f.notes[idx]];
    } else return;
    saveData(); renderFolders();
}

function moveFolderDir(fid, dir) {
    const idx = appData.folders.findIndex(f => f.id === fid);
    if (idx === -1) return;
    if (dir === 'up' && idx > 0) {
        [appData.folders[idx - 1], appData.folders[idx]] = [appData.folders[idx], appData.folders[idx - 1]];
    } else if (dir === 'down' && idx < appData.folders.length - 1) {
        [appData.folders[idx], appData.folders[idx + 1]] = [appData.folders[idx + 1], appData.folders[idx]];
    } else return;
    saveData(); renderFolders();
}

// ===== OPERATIONS =====
function createFolder() {
    showModal({ title: '📁 Yeni Klasör', placeholder: 'Klasör adı...', iconPicker: true, onConfirm: (name, icon) => {
        const f = { id: uid(), name, icon, starred: false, createdAt: Date.now(), notes: [] };
        appData.folders.push(f); appData.expandedFolders[f.id] = true;
        saveData(); renderFolders(); showToast('Klasör oluşturuldu ✨');
    }});
}

function renameFolder(fid) {
    const f = getFolder(fid); if (!f) return;
    showModal({ title: '✏️ Adını Değiştir', placeholder: 'Yeni ad...', defaultValue: f.name, onConfirm: name => {
        f.name = name; saveData(); renderFolders();
    }});
}

function deleteFolder(fid) {
    const f = getFolder(fid); if (!f) return;
    if (f.notes.length && !confirm(`"${f.name}" ve içindeki ${f.notes.length} not silinecek?`)) return;
    appData.folders = appData.folders.filter(x => x.id !== fid);
    if (appData.activeFolderId === fid) appData.activeFolderId = null;
    if (appData.activeNoteId && !getNote(appData.activeNoteId)) { appData.activeNoteId = null; showEmptyState(); }
    delete appData.expandedFolders[fid];
    saveData(); renderFolders(); showToast('Silindi', 'error');
}

function createNote(fid) {
    const f = getFolder(fid); if (!f) return;
    const n = { id: uid(), title: 'Yeni Not', content: '', createdAt: Date.now(), updatedAt: Date.now() };
    f.notes.push(n);
    appData.expandedFolders[fid] = true;
    appData.activeFolderId = fid;
    saveData(); renderFolders(); openNote(n.id);
    showToast('Not oluşturuldu ✨');
}

function createQuickNote() {
    if (!appData.folders.length) { const f = { id: uid(), name: 'Notlarım', icon: '📋', starred: false, createdAt: Date.now(), notes: [] }; appData.folders.push(f); appData.expandedFolders[f.id] = true; }
    createNote(appData.folders[0].id);
}

function deleteNote(nid, fid) {
    const f = getFolder(fid); if (!f) return;
    f.notes = f.notes.filter(n => n.id !== nid);
    if (appData.activeNoteId === nid) { appData.activeNoteId = null; showEmptyState(); }
    saveData(); renderFolders(); showToast('Silindi', 'error');
}

function duplicateNote(nid, fid) {
    const f = getFolder(fid), r = getNote(nid); if (!f || !r) return;
    const c = { ...JSON.parse(JSON.stringify(r.note)), id: uid(), title: r.note.title + ' (Kopya)', createdAt: Date.now(), updatedAt: Date.now() };
    f.notes.push(c); saveData(); renderFolders(); showToast('Kopyalandı 📋');
}

function moveNote(nid, from, to) {
    const ff = getFolder(from), tf = getFolder(to); if (!ff || !tf) return;
    const i = ff.notes.findIndex(n => n.id === nid); if (i === -1) return;
    const [n] = ff.notes.splice(i, 1); tf.notes.push(n);
    appData.expandedFolders[to] = true;
    saveData(); renderFolders(); showToast(`"${tf.name}" klasörüne taşındı`);
}

// ===== EDITOR =====
function openNote(nid) {
    // Before switching, save current note
    if (currentEditingNote) {
        const prev = getNote(currentEditingNote.note.id);
        if (prev) {
            prev.note.title = document.getElementById('noteTitleInput').value.trim() || 'Başlıksız Not';
            prev.note.content = document.getElementById('richEditor').innerHTML;
            prev.note.updatedAt = Date.now();
        }
    }

    const r = getNote(nid); if (!r) return;
    currentEditingNote = r;
    appData.activeNoteId = nid;
    appData.activeFolderId = r.folder.id;

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('editorView').style.display = 'flex';
    document.getElementById('noteTitleInput').value = r.note.title;
    document.getElementById('richEditor').innerHTML = r.note.content;
    document.getElementById('editorFolderBadge').textContent = r.folder.icon + ' ' + r.folder.name;
    document.getElementById('editorDate').textContent = formatDate(r.note.updatedAt);

    updateCharCount();
    saveData(); renderFolders();

    if (window.innerWidth <= 500) document.getElementById('sidebar').classList.add('hidden');
}

function showEmptyState() {
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('editorView').style.display = 'none';
    currentEditingNote = null;
}

function deleteCurrentNote() {
    if (!currentEditingNote) return;
    if (!confirm(`"${currentEditingNote.note.title}" silinecek?`)) return;
    deleteNote(currentEditingNote.note.id, currentEditingNote.folder.id);
}

function updateCharCount() {
    const t = document.getElementById('richEditor').textContent || '';
    const w = t.trim() ? t.trim().split(/\s+/).length : 0;
    document.getElementById('charCount').textContent = `${t.length} karakter · ${w} kelime`;
}

function updateStats() {
    const notes = getAllNotes();
    document.getElementById('totalFolders').textContent = appData.folders.length;
    document.getElementById('totalNotes').textContent = notes.length;
    const chars = notes.reduce((s, n) => { const d = document.createElement('div'); d.innerHTML = n.content; return s + (d.textContent||'').length; }, 0);
    document.getElementById('totalChars').textContent = chars > 999 ? (chars/1000).toFixed(1)+'k' : chars;
}

// ===== EVENT LISTENERS =====
document.getElementById('newFolderBtn').onclick = createFolder;
document.getElementById('newQuickNoteBtn').onclick = createQuickNote;
document.getElementById('deleteNoteBtn').onclick = deleteCurrentNote;
document.getElementById('editorBackBtn').onclick = () => document.getElementById('sidebar').classList.remove('hidden');
document.getElementById('searchInput').oninput = renderFolders;

// Manual save button
document.getElementById('saveNoteBtn').onclick = () => {
    if (!currentEditingNote) return;
    const r = getNote(currentEditingNote.note.id); if (!r) return;
    r.note.title = document.getElementById('noteTitleInput').value.trim() || 'Başlıksız Not';
    r.note.content = document.getElementById('richEditor').innerHTML;
    r.note.updatedAt = Date.now();
    currentEditingNote = r;
    saveData(); renderFolders();
    document.getElementById('editorDate').textContent = formatDate(r.note.updatedAt);
    showToast('Kaydedildi 💾');
};

// INSTANT AUTO-SAVE on every input
document.getElementById('richEditor').oninput = () => { updateCharCount(); instantSave(); };
document.getElementById('noteTitleInput').oninput = () => { instantSave(); };

// Toolbar
document.getElementById('editorToolbar').onclick = e => {
    const btn = e.target.closest('.toolbar-btn'); if (!btn) return;
    const cmd = btn.dataset.cmd, block = btn.dataset.cmdBlock;
    if (cmd) document.execCommand(cmd, false, null);
    else if (block === 'h2') document.execCommand('formatBlock', false, '<h2>');
    else if (block === 'blockquote') document.execCommand('formatBlock', false, '<blockquote>');
    document.getElementById('richEditor').focus();
};

document.getElementById('insertLinkBtn').onclick = () => {
    const url = prompt('Link URL:', 'https://');
    if (url) document.execCommand('createLink', false, url);
    document.getElementById('richEditor').focus();
};

document.getElementById('insertCodeBtn').onclick = () => {
    document.execCommand('insertHTML', false, '<code>kod</code>');
    document.getElementById('richEditor').focus();
};

// Keyboard shortcuts
document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 's') { e.preventDefault(); document.getElementById('saveNoteBtn').click(); }
    if (e.ctrlKey && e.key === 'n') { e.preventDefault(); createQuickNote(); }
    if (e.ctrlKey && e.key === 'f') { e.preventDefault(); document.getElementById('searchInput').focus(); }
    if (e.key === 'Escape') {
        const s = document.getElementById('searchInput');
        if (document.activeElement === s) { s.value = ''; renderFolders(); s.blur(); }
        else if (window.innerWidth <= 500) document.getElementById('sidebar').classList.remove('hidden');
    }
});

// ===== INIT =====
loadData();
renderFolders();
updateStats();
</script>
</body>
</html>
